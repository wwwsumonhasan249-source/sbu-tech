<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SBU ROYAL HUB | MD SUMON HASAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/hls.js@1.5.0/dist/hls.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .royal-gold { color: #d4af37; }
        .bg-royal { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); }
        .gold-border { border: 1px solid #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [channels] = useState([
                { id: 1, name: 'PRIME STREAM 01', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
                { id: 2, name: 'PRIME STREAM 02', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
                { id: 3, name: 'BTV Bangla . 03', url: 'http://198.195.239.50:8095/btv/video.m3u8' },
                { id: 4, name: 'P tv. STREAM 04', url: 'http://198.195.239.50:8095/ptv/tracks-v1a1/mono.m3u8' },
                { id: 5, name: 'PRIME STREAM 05', url: '' },
                { id: 6, name: 'PRIME STREAM 06', url: '' },
                { id: 7, name: 'PRIME STREAM 07', url: '' },
                { id: 8, name: 'PRIME STREAM 08', url: '' },
                { id: 9, name: 'PRIME STREAM 09', url: '' },
                { id: 10, name: 'PRIME STREAM 10', url: '' }
            ]);

            const playVideo = (url) => {
                if(!url) { alert("দুঃখিত, এই স্ট্রিমিং লিঙ্কটি বর্তমানে অফলাইন।"); return; }
                const video = document.getElementById('videoPlayer');
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    video.play();
                } else { video.src = url; }
            };

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <header className="text-center mb-16">
                        <h1 style={{fontFamily: 'Cinzel'}} className="text-6xl font-bold royal-gold mb-2">SBU ROYAL HUB</h1>
                        <p className="text-sm tracking-[0.3em] uppercase text-gray-400">Excellence in Digital Solutions</p>
                    </header>

                    <div className="grid lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2">
                            <video id="videoPlayer" controls className="w-full aspect-video bg-black rounded-lg gold-border" autoPlay></video>
                        </div>
                        <div className="bg-royal p-6 rounded-lg gold-border h-[500px] overflow-y-auto">
                            <h2 className="royal-gold font-bold mb-6 border-b border-[#d4af37]/30 pb-2 text-xl">CHANNELS</h2>
                            {channels.map((ch) => (
                                <button key={ch.id} onClick={() => playVideo(ch.url)} 
                                    className="block w-full text-left p-4 mb-3 bg-[#1a1a1a] hover:bg-[#d4af37] hover:text-black transition-all border border-[#d4af37]/20 rounded font-semibold text-sm">
                                    {ch.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    <section className="bg-royal p-10 rounded-lg gold-border mt-10 flex flex-col md:flex-row items-center gap-10">
                        <img src="1000623678.png" alt="MD Sumon Hasan" className="w-48 h-48 rounded-full border-2 border-[#d4af37] p-1 object-cover" />
                        <div>
                            <h2 style={{fontFamily: 'Cinzel'}} className="text-4xl font-bold royal-gold mb-3">MD SUMON HASAN</h2>
                            <p className="text-lg text-gray-300 italic mb-6 leading-relaxed max-w-2xl">
                                "ডিজিটাল উদ্ভাবন এবং নিখুঁত প্রযুক্তির মেলবন্ধনে আমি তৈরি করি আপনার প্রজেক্টের শ্রেষ্ঠ রূপ। সাধারণ সমস্যার সমাধান থেকে শুরু করে প্রিমিয়াম কাস্টমাইজেশন—সবখানেই আমার দক্ষতার ছাপ স্পষ্ট।"
                            </p>
                            
                            <div className="grid md:grid-cols-2 gap-4 text-sm">
                                <p className="text-gray-400">✦ অ্যান্ড্রয়েড অ্যাপ মডিফিকেশন ও ডেভেলপমেন্ট</p>
                                <p className="text-gray-400">✦ প্রিমিয়াম ওয়েবসাইট ও সফটওয়্যার সাপোর্ট</p>
                                <p className="text-gray-400">✦ এস্থেটিক লোগো, ব্যানার ও গ্রাফিক্স ডিজাইন</p>
                                <p className="text-gray-400">✦ প্রো-লেভেল ভিডিও ও ফটো এডিটিং</p>
                            </div>

                            <div className="flex flex-wrap gap-4 mt-8">
                                <a href="#" className="px-6 py-2 border border-[#d4af37] royal-gold hover:bg-[#d4af37] hover:text-black transition uppercase text-xs font-bold">WhatsApp: +৮৮০-XXXXXXXXXX</a>
                                <a href="#" className="px-6 py-2 border border-[#d4af37] royal-gold hover:bg-[#d4af37] hover:text-black transition uppercase text-xs font-bold">Email: Contact@SumonHasan.com</a>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
